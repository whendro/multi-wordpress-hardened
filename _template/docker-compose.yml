version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Per-site WordPress stack
# Copy this folder to a site directory (e.g. /mnt/cw/mysite/) and fill in .env
#
# NPM routes:  yourdomain.com → http://SITE_NAME-nginx:80
# No ports exposed to host — all traffic via NPM on poolnet
# ─────────────────────────────────────────────────────────────────────────────

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ../../_template/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../_template/nginx/wordpress.conf:/etc/nginx/conf.d/default.conf:ro
      - ./wp_data:/var/www/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - internal
      - poolnet
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  php:
    build:
      context: .                   # build context = _template/ dir (php/ lives here)
      dockerfile: Dockerfile
    image: wisnu/wp-hardened:6.7         # tag it once, reuse across all sites
    container_name: ${SITE_NAME}-php
    restart: unless-stopped
    volumes:
      - ./wp_data:/var/www/html
      - ./logs/php:/var/log/php
    environment:
      WORDPRESS_DB_HOST:      ${DB_HOST}
      WORDPRESS_DB_USER:      ${DB_USER}
      WORDPRESS_DB_PASSWORD:  ${DB_PASSWORD}
      WORDPRESS_DB_NAME:      ${DB_NAME}
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        define('WP_REDIS_HOST', '${REDIS_HOST}');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_PREFIX', '${REDIS_PREFIX}');
        define('WP_REDIS_DATABASE', ${REDIS_DB});
        // HTTPS detection is already handled natively in wp-config.php (reverse proxy header)
    networks:
      - internal
      - poolnet
      - srv_db
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  internal:
    driver: bridge

  poolnet:
    external: true

  srv_db:
    external: true
