version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Per-site WordPress stack
# Copy this folder to /srv/wordpress/siteN and fill in .env
#
# NPM routes:  yourdomain.com → http://SITE_NAME-nginx:80
# No ports exposed to host — all traffic via NPM on poolnet
# ─────────────────────────────────────────────────────────────────────────────

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: ${SITE_NAME}-nginx      # e.g. wp-site1-nginx
    restart: unless-stopped
    volumes:
      - ../_template/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../_template/nginx/wordpress.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_data:/var/www/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - internal    # talks to php
      - poolnet     # reachable by NPM
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    # NO ports: block — NPM reaches this container by name on poolnet

  php:
    # build:
    #   context: ../_template       # shared Dockerfile for all sites
    #   dockerfile: Dockerfile
    # image: wp-hardened:6.7        # built once, reused by all sites
    image: wisnu/wordpress:6.7-php8.3-fpm-alpine
    container_name: ${SITE_NAME}-php
    restart: unless-stopped
    volumes:
      - wp_data:/var/www/html
      - ./logs/php:/var/log/php
    environment:
      WORDPRESS_DB_HOST:      ${DB_HOST}
      WORDPRESS_DB_USER:      ${DB_USER}
      WORDPRESS_DB_PASSWORD:  ${DB_PASSWORD}
      WORDPRESS_DB_NAME:      ${DB_NAME}
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        define('WP_DEBUG', false);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_REDIS_HOST', '${REDIS_HOST}');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_PREFIX', '${REDIS_PREFIX}');
        define('WP_REDIS_DATABASE', ${REDIS_DB});
        if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $_SERVER['HTTPS'] = 'on';
        }
    networks:
      - internal    # talks to nginx only
      - poolnet     # talks to MariaDB + Redis
      - srv_db      # talks to MariaDB if on separate network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  wp_data:
    name: ${SITE_NAME}-wp_data    # unique volume name per site

networks:
  internal:
    driver: bridge                # nginx ↔ php, isolated per site

  poolnet:
    external: true                # shared: NPM + MariaDB + Redis

  srv_db:
    external: true                # shared: MariaDB
