server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ── Block sensitive files ────────────────────────────────────────────
    location ~* /\. {
        deny all; access_log off; log_not_found off;
    }
    location ~* /(wp-config\.php|readme\.html|license\.txt) {
        deny all; return 404;
    }

    # Block PHP in uploads (stops webshell execution)
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all; return 404;
    }

    # ── Block XML-RPC (major brute-force vector) ─────────────────────────
    location = /xmlrpc.php {
        deny all; return 404;
        access_log off; log_not_found off;
    }

    # ── Rate-limit wp-login.php ──────────────────────────────────────────
    location = /wp-login.php {
        limit_req zone=wp_login burst=3 nodelay;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
    }

    # ── Block suspicious query strings ───────────────────────────────────
    set $block 0;
    if ($query_string ~* "base64_encode\(.*\)")          { set $block 1; }
    if ($query_string ~* "(<|%3C).*script.*(>|%3E)")     { set $block 1; }
    if ($query_string ~* "GLOBALS(=|\[|\%[0-9A-Z]{0,2})") { set $block 1; }
    if ($block = 1) { return 403; }

    # ── WordPress routing ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Static assets ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
