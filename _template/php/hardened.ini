; ── Security ────────────────────────────────────────────────────────────────
expose_php             = Off
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /proc/self/fd/2

; curl_exec and curl_multi_exec are intentionally NOT disabled —
; WordPress core and plugins require them for HTTP requests.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,\
  parse_ini_file,show_source,pcntl_exec,\
  pcntl_fork,pcntl_signal,pcntl_waitpid,pcntl_wexitstatus,\
  pcntl_wifstopped,pcntl_wifsignaled,posix_kill,posix_mkfifo,\
  posix_setpgid,posix_setsid,posix_setuid,dl,syslog,openlog

open_basedir       = /var/www/html:/tmp:/usr/local/lib/php

upload_max_filesize = 64M
post_max_size       = 64M
max_file_uploads    = 10
max_execution_time  = 60
max_input_time      = 60
memory_limit        = 256M

allow_url_fopen    = Off
allow_url_include  = Off

; ── Session hardening ────────────────────────────────────────────────────────
session.cookie_httponly = On
session.cookie_secure   = On
session.cookie_samesite = Strict
session.use_strict_mode = On
session.use_only_cookies = On

; ── OPcache ─────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 60
opcache.save_comments          = 1
opcache.validate_permission    = 1
opcache.validate_root          = 1
