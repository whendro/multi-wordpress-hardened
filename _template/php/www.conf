[www]
user  = www-data
group = www-data

listen       = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; Inherit all env vars from the container (set by docker-compose environment:)
; env[] directives with $VAR syntax are NOT shell-expanded by FPM — don't use them
clear_env = no

catch_workers_output       = yes
php_flag[display_errors]   = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
php_admin_flag[allow_url_fopen] = off
